interface:
  display_name: "HFT Meta Review"
  short_description: "定期 meta-review HFT 投研产出，生成阶段总结并更新 sota + updates（Layer 1 only）"
  default_prompt: "Use $hft-meta-review when the user request matches this skill: 周期性对 HFT 投研工作做 meta review：读取 target_and_workflow / sota_snapshot / research_updates 三份基础文档，在可预测路径（HFTPool/ob_research / factor_agent_docs / pool / /data/db/hft/analyzer2 / model_output）下扫描自上次 update 以来的新增产出，生成阶段性总结并询问用户是否更新 sota_snapshot 和 research_updates。支持可选 direction 参数做定向深度分析。范围严格限定在 Layer 1（LGBM 信号质量），不维护 Layer 2 回测与 Layer 3 实盘。 Argument hint: [direction | since-date] (可选). Follow the skill workflow exactly and preserve any required gates, checks, and external-command safety rules."
