interface:
  display_name: "Issue Conclusion"
  short_description: "Post a conclusion comment and mark an issue ready to close in the target repo"
  default_prompt: "Use $issue-conclusion to summarize and close out an issue in the target GitHub repo. Resolve the repo and summarize the final outcome in the main thread, then delegate full issue-history review, conclusion drafting, comment posting, and ready-to-close labeling to a fresh Codex subagent using model gpt-5.4 with reasoning xhigh. The subagent must read the issue body plus all comments, not just the latest thread summary."
